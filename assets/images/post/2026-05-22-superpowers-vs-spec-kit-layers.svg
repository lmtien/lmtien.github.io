<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="650" viewBox="0 0 1120 650" role="img" aria-labelledby="title desc">
  <title id="title">Superpowers and Spec Kit layers</title>
  <desc id="desc">A diagram comparing Spec Kit as a spec artifact layer and Superpowers as an agent behavior layer.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="13" flood-color="#020617" flood-opacity="0.36"/>
    </filter>
  </defs>

  <rect width="1120" height="650" rx="22" fill="#0f172a"/>
  <rect x="54" y="44" width="1012" height="558" rx="18" fill="#111827" stroke="#334155"/>

  <text x="84" y="98" fill="#f8fafc" font-family="Arial, sans-serif" font-size="34" font-weight="700">Two layers, different jobs</text>
  <text x="84" y="134" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="18">Spec Kit defines the work. Superpowers disciplines the agent doing the work.</text>

  <g font-family="Arial, sans-serif" filter="url(#shadow)">
    <g transform="translate(132 204)">
      <rect width="384" height="286" rx="18" fill="#f8fafc"/>
      <rect width="384" height="58" rx="18" fill="#bae6fd"/>
      <text x="28" y="38" fill="#082f49" font-size="24" font-weight="700">Spec Kit</text>
      <text x="28" y="94" fill="#0f172a" font-size="20" font-weight="700">Artifact layer</text>
      <text x="28" y="132" fill="#334155" font-size="16">- specification</text>
      <text x="28" y="162" fill="#334155" font-size="16">- clarification</text>
      <text x="28" y="192" fill="#334155" font-size="16">- plan</text>
      <text x="28" y="222" fill="#334155" font-size="16">- tasks</text>
      <text x="28" y="252" fill="#334155" font-size="16">- analysis before implementation</text>
    </g>
    <g transform="translate(604 204)">
      <rect width="384" height="286" rx="18" fill="#f8fafc"/>
      <rect width="384" height="58" rx="18" fill="#dcfce7"/>
      <text x="28" y="38" fill="#052e16" font-size="24" font-weight="700">Superpowers</text>
      <text x="28" y="94" fill="#0f172a" font-size="20" font-weight="700">Agent behavior layer</text>
      <text x="28" y="132" fill="#334155" font-size="16">- brainstorming</text>
      <text x="28" y="162" fill="#334155" font-size="16">- worktrees</text>
      <text x="28" y="192" fill="#334155" font-size="16">- TDD</text>
      <text x="28" y="222" fill="#334155" font-size="16">- subagents</text>
      <text x="28" y="252" fill="#334155" font-size="16">- code review and finishing</text>
    </g>
  </g>

  <g transform="translate(184 548)" font-family="Arial, sans-serif">
    <rect width="752" height="38" rx="9" fill="#0b1120" stroke="#334155"/>
    <text x="376" y="25" text-anchor="middle" fill="#cbd5e1" font-size="16">Use one to clarify the destination, the other to improve the trip.</text>
  </g>
</svg>
