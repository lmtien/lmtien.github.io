<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" role="img" aria-labelledby="title desc">
  <title id="title">Headless CMS versus custom backend</title>
  <desc id="desc">A comparison of where a headless CMS fits and where a custom backend service fits.</desc>
  <defs>
    <style>
      .bg { fill: #fbfaf7; }
      .left { fill: #ecfdf5; stroke: #16794c; stroke-width: 2; }
      .right { fill: #eef2ff; stroke: #3b57d1; stroke-width: 2; }
      .middle { fill: #fff7ed; stroke: #c76b18; stroke-width: 2; }
      .pill { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .text { font-family: Arial, sans-serif; fill: #17202a; }
      .title { font-size: 26px; font-weight: 700; }
      .label { font-size: 18px; font-weight: 700; }
      .small { font-size: 14px; }
      .note { font-size: 13px; fill: #475569; }
    </style>
  </defs>

  <rect class="bg" width="900" height="500" rx="18"/>
  <text class="text title" x="52" y="54">Headless CMS vs custom backend</text>

  <rect class="left" x="54" y="92" width="260" height="325" rx="16"/>
  <text class="text label" x="92" y="132">Headless CMS</text>
  <rect class="pill" x="82" y="164" width="204" height="38" rx="19"/>
  <text class="text small" x="118" y="188">content editing</text>
  <rect class="pill" x="82" y="216" width="204" height="38" rx="19"/>
  <text class="text small" x="109" y="240">media and assets</text>
  <rect class="pill" x="82" y="268" width="204" height="38" rx="19"/>
  <text class="text small" x="116" y="292">preview workflow</text>
  <rect class="pill" x="82" y="320" width="204" height="38" rx="19"/>
  <text class="text small" x="125" y="344">content API</text>

  <rect class="middle" x="352" y="158" width="196" height="190" rx="16"/>
  <text class="text label" x="402" y="199">Frontend</text>
  <text class="text small" x="392" y="235">Next.js, Astro,</text>
  <text class="text small" x="397" y="259">mobile app,</text>
  <text class="text small" x="399" y="283">kiosk, docs</text>
  <text class="text note" x="380" y="320">calls whichever API fits</text>

  <rect class="right" x="586" y="92" width="260" height="325" rx="16"/>
  <text class="text label" x="625" y="132">Custom backend</text>
  <rect class="pill" x="614" y="164" width="204" height="38" rx="19"/>
  <text class="text small" x="650" y="188">business logic</text>
  <rect class="pill" x="614" y="216" width="204" height="38" rx="19"/>
  <text class="text small" x="657" y="240">transactions</text>
  <rect class="pill" x="614" y="268" width="204" height="38" rx="19"/>
  <text class="text small" x="648" y="292">auth and billing</text>
  <rect class="pill" x="614" y="320" width="204" height="38" rx="19"/>
  <text class="text small" x="648" y="344">domain rules</text>

  <path d="M314 250 L350 250" stroke="#24323f" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M586 250 L550 250" stroke="#24323f" stroke-width="2.5" marker-end="url(#arrowLeft)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#24323f"/>
    </marker>
    <marker id="arrowLeft" markerWidth="10" markerHeight="10" refX="1" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M9,0 L9,6 L0,3 z" fill="#24323f"/>
    </marker>
  </defs>

  <text class="text small" x="79" y="454">My rule: CMS for content operations. Backend services for product behavior.</text>
</svg>
