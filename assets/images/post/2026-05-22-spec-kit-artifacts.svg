<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="640" viewBox="0 0 1120 640" role="img" aria-labelledby="title desc">
  <title id="title">Spec Kit artifacts</title>
  <desc id="desc">A diagram showing Markdown artifacts generated by Spec Kit: requirements, plan, tasks, and analysis.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#94a3b8"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="13" flood-color="#020617" flood-opacity="0.34"/>
    </filter>
  </defs>

  <rect width="1120" height="640" rx="22" fill="#0f172a"/>
  <rect x="54" y="44" width="1012" height="548" rx="18" fill="#111827" stroke="#334155"/>

  <text x="84" y="98" fill="#f8fafc" font-family="Arial, sans-serif" font-size="34" font-weight="700">The useful output is Markdown</text>
  <text x="84" y="134" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="18">Spec Kit gives the agent structured context, but humans can still read and review it.</text>

  <g fill="none" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)">
    <path d="M314 318 H420"/>
    <path d="M576 318 H682"/>
    <path d="M780 406 C720 492 592 526 500 492"/>
    <path d="M420 492 C324 522 226 458 226 388"/>
  </g>

  <g filter="url(#shadow)" font-family="Arial, sans-serif">
    <g transform="translate(104 218)">
      <rect width="220" height="170" rx="14" fill="#f8fafc"/>
      <rect width="220" height="46" rx="14" fill="#bae6fd"/>
      <text x="22" y="31" fill="#082f49" font-size="18" font-weight="700">spec.md</text>
      <text x="22" y="80" fill="#334155" font-size="15">User stories</text>
      <text x="22" y="108" fill="#334155" font-size="15">Requirements</text>
      <text x="22" y="136" fill="#334155" font-size="15">Acceptance criteria</text>
    </g>
    <g transform="translate(450 218)">
      <rect width="220" height="170" rx="14" fill="#f8fafc"/>
      <rect width="220" height="46" rx="14" fill="#fef3c7"/>
      <text x="22" y="31" fill="#451a03" font-size="18" font-weight="700">plan.md</text>
      <text x="22" y="80" fill="#334155" font-size="15">Architecture</text>
      <text x="22" y="108" fill="#334155" font-size="15">Tech stack</text>
      <text x="22" y="136" fill="#334155" font-size="15">Risk notes</text>
    </g>
    <g transform="translate(796 218)">
      <rect width="220" height="170" rx="14" fill="#f8fafc"/>
      <rect width="220" height="46" rx="14" fill="#dcfce7"/>
      <text x="22" y="31" fill="#052e16" font-size="18" font-weight="700">tasks.md</text>
      <text x="22" y="80" fill="#334155" font-size="15">Ordered tasks</text>
      <text x="22" y="108" fill="#334155" font-size="15">Test mapping</text>
      <text x="22" y="136" fill="#334155" font-size="15">Implementation path</text>
    </g>
  </g>

  <g transform="translate(392 472)" font-family="Arial, sans-serif" filter="url(#shadow)">
    <rect width="336" height="82" rx="14" fill="#0b1120" stroke="#334155"/>
    <text x="168" y="34" text-anchor="middle" fill="#f8fafc" font-size="21" font-weight="700">analyze before coding</text>
    <text x="168" y="60" text-anchor="middle" fill="#cbd5e1" font-size="15">catch gaps while they are still cheap</text>
  </g>
</svg>
