<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="650" viewBox="0 0 1120 650" role="img" aria-labelledby="title desc">
  <title id="title">Practical AI era playbook</title>
  <desc id="desc">A five-step playbook for living with the AI boom: learn, measure, ship small, protect trust, and keep durable skills.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#38bdf8"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="13" flood-color="#020617" flood-opacity="0.34"/>
    </filter>
  </defs>

  <rect width="1120" height="650" rx="22" fill="#0f172a"/>
  <rect x="54" y="44" width="1012" height="558" rx="18" fill="#111827" stroke="#334155"/>

  <text x="84" y="98" fill="#f8fafc" font-family="Arial, sans-serif" font-size="34" font-weight="700">How I would live with the AI boom</text>
  <text x="84" y="134" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="18">Do not worship it. Do not ignore it. Put it to work in small, measurable ways.</text>

  <g fill="none" stroke="#38bdf8" stroke-width="5" marker-end="url(#arrow)">
    <path d="M258 300 H382"/>
    <path d="M506 300 H630"/>
    <path d="M754 300 H878"/>
  </g>

  <g font-family="Arial, sans-serif" filter="url(#shadow)">
    <g transform="translate(104 230)">
      <rect width="190" height="140" rx="14" fill="#bae6fd"/>
      <text x="95" y="42" text-anchor="middle" fill="#082f49" font-size="21" font-weight="700">Learn</text>
      <text x="95" y="74" text-anchor="middle" fill="#075985" font-size="14">use the tools</text>
      <text x="95" y="100" text-anchor="middle" fill="#075985" font-size="14">but learn basics</text>
    </g>
    <g transform="translate(352 230)">
      <rect width="190" height="140" rx="14" fill="#fef3c7"/>
      <text x="95" y="42" text-anchor="middle" fill="#451a03" font-size="21" font-weight="700">Measure</text>
      <text x="95" y="74" text-anchor="middle" fill="#78350f" font-size="14">time, cost, quality</text>
      <text x="95" y="100" text-anchor="middle" fill="#78350f" font-size="14">before and after</text>
    </g>
    <g transform="translate(600 230)">
      <rect width="190" height="140" rx="14" fill="#dcfce7"/>
      <text x="95" y="42" text-anchor="middle" fill="#052e16" font-size="21" font-weight="700">Ship small</text>
      <text x="95" y="74" text-anchor="middle" fill="#166534" font-size="14">workflow first</text>
      <text x="95" y="100" text-anchor="middle" fill="#166534" font-size="14">platform later</text>
    </g>
    <g transform="translate(848 230)">
      <rect width="190" height="140" rx="14" fill="#fbcfe8"/>
      <text x="95" y="42" text-anchor="middle" fill="#500724" font-size="21" font-weight="700">Protect trust</text>
      <text x="95" y="74" text-anchor="middle" fill="#831843" font-size="14">privacy, review,</text>
      <text x="95" y="100" text-anchor="middle" fill="#831843" font-size="14">rollback</text>
    </g>
  </g>

  <g transform="translate(220 464)" font-family="Arial, sans-serif" filter="url(#shadow)">
    <rect width="680" height="74" rx="14" fill="#0b1120" stroke="#334155"/>
    <text x="340" y="30" text-anchor="middle" fill="#f8fafc" font-size="20" font-weight="700">Keep durable skills</text>
    <text x="340" y="54" text-anchor="middle" fill="#cbd5e1" font-size="15">domain knowledge, engineering judgment, systems, security, communication</text>
  </g>
</svg>
