<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="640" viewBox="0 0 1120 640" role="img" aria-labelledby="title desc">
  <title id="title">NocoDB as a layer over databases</title>
  <desc id="desc">A diagram showing NocoDB providing spreadsheet views, forms, APIs, permissions, and automations on top of SQL databases.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#38bdf8"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="13" flood-color="#020617" flood-opacity="0.36"/>
    </filter>
  </defs>

  <rect width="1120" height="640" rx="22" fill="#0f172a"/>
  <rect x="54" y="44" width="1012" height="548" rx="18" fill="#111827" stroke="#334155"/>

  <text x="84" y="98" fill="#f8fafc" font-family="Arial, sans-serif" font-size="34" font-weight="700">NocoDB is the friendly layer</text>
  <text x="84" y="134" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="18">The database still matters. NocoDB makes it usable by more people.</text>

  <g fill="none" stroke="#38bdf8" stroke-width="5" marker-end="url(#arrow)">
    <path d="M560 248 V338"/>
    <path d="M410 418 H300"/>
    <path d="M560 418 H560"/>
    <path d="M710 418 H820"/>
  </g>

  <g font-family="Arial, sans-serif" filter="url(#shadow)">
    <g transform="translate(350 178)">
      <rect width="420" height="128" rx="18" fill="#bae6fd"/>
      <text x="210" y="46" text-anchor="middle" fill="#082f49" font-size="26" font-weight="700">NocoDB</text>
      <text x="210" y="82" text-anchor="middle" fill="#075985" font-size="16">spreadsheet UI, forms, views, permissions, APIs</text>
    </g>
    <g transform="translate(120 372)">
      <rect width="250" height="116" rx="14" fill="#f8fafc"/>
      <text x="125" y="43" text-anchor="middle" fill="#0f172a" font-size="22" font-weight="700">PostgreSQL</text>
      <text x="125" y="72" text-anchor="middle" fill="#475569" font-size="14">strong relational database</text>
    </g>
    <g transform="translate(435 372)">
      <rect width="250" height="116" rx="14" fill="#fef3c7"/>
      <text x="125" y="43" text-anchor="middle" fill="#451a03" font-size="22" font-weight="700">MySQL / MariaDB</text>
      <text x="125" y="72" text-anchor="middle" fill="#78350f" font-size="14">another SQL source</text>
    </g>
    <g transform="translate(750 372)">
      <rect width="250" height="116" rx="14" fill="#dcfce7"/>
      <text x="125" y="43" text-anchor="middle" fill="#052e16" font-size="22" font-weight="700">SQLite / others</text>
      <text x="125" y="72" text-anchor="middle" fill="#166534" font-size="14">good for local/simple use</text>
    </g>
  </g>

  <g transform="translate(214 548)" font-family="Arial, sans-serif">
    <rect width="692" height="38" rx="9" fill="#0b1120" stroke="#334155"/>
    <text x="346" y="25" text-anchor="middle" fill="#cbd5e1" font-size="16">Think "database plus UI and workflow," not "database engine replacement."</text>
  </g>
</svg>
