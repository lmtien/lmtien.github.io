<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="650" viewBox="0 0 1120 650" role="img" aria-labelledby="title desc">
  <title id="title">AI-assisted software engineering loop</title>
  <desc id="desc">A loop showing human intent, AI agents, code changes, tests, review, and production feedback.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#38bdf8"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#020617" flood-opacity="0.36"/>
    </filter>
  </defs>

  <rect width="1120" height="650" rx="22" fill="#0f172a"/>
  <rect x="54" y="44" width="1012" height="560" rx="18" fill="#111827" stroke="#334155"/>

  <text x="86" y="98" fill="#f8fafc" font-family="Arial, sans-serif" font-size="34" font-weight="700">The engineering loop gets faster</text>
  <text x="86" y="134" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="18">AI may write more code, but the loop still needs intent, tests, review, and production feedback.</text>

  <g fill="none" stroke="#38bdf8" stroke-width="5" marker-end="url(#arrow)">
    <path d="M354 190 C472 126, 648 126, 766 190"/>
    <path d="M832 270 C876 370, 816 480, 700 508"/>
    <path d="M596 536 C452 558, 306 486, 278 352"/>
    <path d="M284 282 C288 236, 310 210, 354 190"/>
  </g>

  <g filter="url(#shadow)" font-family="Arial, sans-serif">
    <g>
      <rect x="186" y="250" width="205" height="108" rx="14" fill="#f8fafc"/>
      <text x="288" y="294" text-anchor="middle" fill="#0f172a" font-size="23" font-weight="700">Human intent</text>
      <text x="288" y="324" text-anchor="middle" fill="#475569" font-size="15">what should exist?</text>
    </g>
    <g>
      <rect x="452" y="156" width="220" height="108" rx="14" fill="#bae6fd"/>
      <text x="562" y="200" text-anchor="middle" fill="#082f49" font-size="23" font-weight="700">AI agents</text>
      <text x="562" y="230" text-anchor="middle" fill="#075985" font-size="15">draft, search, refactor</text>
    </g>
    <g>
      <rect x="728" y="250" width="205" height="108" rx="14" fill="#fef3c7"/>
      <text x="830" y="294" text-anchor="middle" fill="#451a03" font-size="23" font-weight="700">Code change</text>
      <text x="830" y="324" text-anchor="middle" fill="#78350f" font-size="15">more volume, faster</text>
    </g>
    <g>
      <rect x="600" y="432" width="220" height="108" rx="14" fill="#dcfce7"/>
      <text x="710" y="476" text-anchor="middle" fill="#052e16" font-size="23" font-weight="700">Tests and review</text>
      <text x="710" y="506" text-anchor="middle" fill="#166534" font-size="15">where trust is earned</text>
    </g>
    <g>
      <rect x="300" y="432" width="220" height="108" rx="14" fill="#fbcfe8"/>
      <text x="410" y="476" text-anchor="middle" fill="#500724" font-size="23" font-weight="700">Production</text>
      <text x="410" y="506" text-anchor="middle" fill="#831843" font-size="15">real users, real failures</text>
    </g>
  </g>

  <g transform="translate(86 548)" font-family="Arial, sans-serif">
    <rect width="946" height="36" rx="9" fill="#0b1120" stroke="#334155"/>
    <text x="24" y="24" fill="#cbd5e1" font-size="16">The next 5-10 years are less about typing speed and more about tightening this feedback loop.</text>
  </g>
</svg>
