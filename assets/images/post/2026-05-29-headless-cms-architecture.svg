<svg xmlns="http://www.w3.org/2000/svg" width="900" height="470" viewBox="0 0 900 470" role="img" aria-labelledby="title desc">
  <title id="title">Headless CMS architecture</title>
  <desc id="desc">Editors manage structured content in a headless CMS, which exposes APIs to websites, apps, and other channels.</desc>
  <defs>
    <style>
      .bg { fill: #fbfaf7; }
      .panel { fill: #ffffff; stroke: #24323f; stroke-width: 2; }
      .soft { fill: #f1f5f9; stroke: #64748b; stroke-width: 1.5; }
      .cms { fill: #e8f6ef; stroke: #14804a; stroke-width: 2; }
      .api { fill: #fff4d6; stroke: #b7791f; stroke-width: 2; }
      .front { fill: #eaf0ff; stroke: #3457d5; stroke-width: 2; }
      .text { font-family: Arial, sans-serif; fill: #17202a; }
      .title { font-size: 26px; font-weight: 700; }
      .label { font-size: 18px; font-weight: 700; }
      .small { font-size: 14px; }
      .tiny { font-size: 12px; fill: #52616f; }
      .arrow { stroke: #24323f; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#24323f"/>
    </marker>
  </defs>

  <rect class="bg" width="900" height="470" rx="18"/>
  <text class="text title" x="48" y="54">Headless CMS: the body has content, the frontend has the face</text>

  <rect class="panel" x="50" y="100" width="185" height="250" rx="12"/>
  <text class="text label" x="82" y="140">Editors</text>
  <rect class="soft" x="78" y="170" width="128" height="34" rx="8"/>
  <text class="text small" x="103" y="192">write</text>
  <rect class="soft" x="78" y="218" width="128" height="34" rx="8"/>
  <text class="text small" x="102" y="240">review</text>
  <rect class="soft" x="78" y="266" width="128" height="34" rx="8"/>
  <text class="text small" x="101" y="288">publish</text>

  <rect class="cms" x="326" y="92" width="250" height="266" rx="14"/>
  <text class="text label" x="365" y="135">Headless CMS</text>
  <text class="text small" x="365" y="164">content model</text>
  <text class="text small" x="365" y="190">media library</text>
  <text class="text small" x="365" y="216">roles and workflow</text>
  <text class="text small" x="365" y="242">preview</text>
  <text class="text small" x="365" y="268">webhooks</text>
  <text class="text small" x="365" y="294">REST or GraphQL APIs</text>

  <rect class="api" x="633" y="145" width="100" height="160" rx="46"/>
  <text class="text label" x="662" y="215">API</text>
  <text class="text tiny" x="659" y="240">JSON</text>

  <rect class="front" x="780" y="84" width="78" height="64" rx="10"/>
  <text class="text tiny" x="798" y="120">Website</text>
  <rect class="front" x="780" y="180" width="78" height="64" rx="10"/>
  <text class="text tiny" x="806" y="216">App</text>
  <rect class="front" x="780" y="276" width="78" height="64" rx="10"/>
  <text class="text tiny" x="795" y="312">Display</text>

  <path class="arrow" d="M235 225 C270 225, 285 225, 318 225"/>
  <path class="arrow" d="M576 225 C600 225, 610 225, 628 225"/>
  <path class="arrow" d="M733 225 C755 120, 760 116, 777 116"/>
  <path class="arrow" d="M733 225 C754 214, 759 212, 777 212"/>
  <path class="arrow" d="M733 225 C754 305, 760 308, 777 308"/>

  <text class="text small" x="315" y="405">The CMS manages content. Your frontend decides how it looks and behaves.</text>
</svg>
