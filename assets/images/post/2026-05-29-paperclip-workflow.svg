<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="640" viewBox="0 0 1120 640" role="img" aria-labelledby="title desc">
  <title id="title">Simple Paperclip workflow</title>
  <desc id="desc">A simple workflow for using Paperclip: set goal, add agents, create tasks, run heartbeats, review, and control budgets.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#38bdf8"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="13" flood-color="#020617" flood-opacity="0.36"/>
    </filter>
  </defs>

  <rect width="1120" height="640" rx="22" fill="#0f172a"/>
  <rect x="54" y="44" width="1012" height="548" rx="18" fill="#111827" stroke="#334155"/>

  <text x="84" y="98" fill="#f8fafc" font-family="Arial, sans-serif" font-size="34" font-weight="700">A safe first workflow</text>
  <text x="84" y="134" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="18">Start with one goal, one or two agents, a small budget, and human review.</text>

  <g fill="none" stroke="#38bdf8" stroke-width="5" marker-end="url(#arrow)">
    <path d="M250 302 H370"/>
    <path d="M490 302 H610"/>
    <path d="M730 302 H850"/>
  </g>

  <g font-family="Arial, sans-serif" filter="url(#shadow)">
    <g transform="translate(104 230)">
      <rect width="190" height="144" rx="14" fill="#bae6fd"/>
      <text x="95" y="42" text-anchor="middle" fill="#082f49" font-size="21" font-weight="700">1. Goal</text>
      <text x="95" y="76" text-anchor="middle" fill="#075985" font-size="14">what should</text>
      <text x="95" y="100" text-anchor="middle" fill="#075985" font-size="14">the team achieve?</text>
    </g>
    <g transform="translate(344 230)">
      <rect width="190" height="144" rx="14" fill="#fef3c7"/>
      <text x="95" y="42" text-anchor="middle" fill="#451a03" font-size="21" font-weight="700">2. Agents</text>
      <text x="95" y="76" text-anchor="middle" fill="#78350f" font-size="14">roles, budget,</text>
      <text x="95" y="100" text-anchor="middle" fill="#78350f" font-size="14">permissions</text>
    </g>
    <g transform="translate(584 230)">
      <rect width="190" height="144" rx="14" fill="#dcfce7"/>
      <text x="95" y="42" text-anchor="middle" fill="#052e16" font-size="21" font-weight="700">3. Tasks</text>
      <text x="95" y="76" text-anchor="middle" fill="#166534" font-size="14">tickets, context,</text>
      <text x="95" y="100" text-anchor="middle" fill="#166534" font-size="14">dependencies</text>
    </g>
    <g transform="translate(824 230)">
      <rect width="190" height="144" rx="14" fill="#fbcfe8"/>
      <text x="95" y="42" text-anchor="middle" fill="#500724" font-size="21" font-weight="700">4. Review</text>
      <text x="95" y="76" text-anchor="middle" fill="#831843" font-size="14">approve work,</text>
      <text x="95" y="100" text-anchor="middle" fill="#831843" font-size="14">watch cost</text>
    </g>
  </g>

  <g transform="translate(220 468)" font-family="Arial, sans-serif" filter="url(#shadow)">
    <rect width="680" height="74" rx="14" fill="#0b1120" stroke="#334155"/>
    <text x="340" y="30" text-anchor="middle" fill="#f8fafc" font-size="20" font-weight="700">My rule</text>
    <text x="340" y="54" text-anchor="middle" fill="#cbd5e1" font-size="15">Do not automate the company. Automate one boring workflow first.</text>
  </g>
</svg>
