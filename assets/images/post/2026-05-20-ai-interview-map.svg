<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="640" viewBox="0 0 1120 640" role="img" aria-labelledby="title desc">
  <title id="title">Interview signals in the AI era</title>
  <desc id="desc">A map of interview signals: fundamentals, tool use, debugging, system thinking, communication, and judgment.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="13" flood-color="#020617" flood-opacity="0.34"/>
    </filter>
  </defs>

  <rect width="1120" height="640" rx="22" fill="#0f172a"/>
  <rect x="54" y="44" width="1012" height="548" rx="18" fill="#111827" stroke="#334155"/>

  <text x="84" y="98" fill="#f8fafc" font-family="Arial, sans-serif" font-size="34" font-weight="700">What interviews should measure now</text>
  <text x="84" y="134" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="18">Not whether you can hide AI usage. Whether you can reason, verify, and communicate.</text>

  <g font-family="Arial, sans-serif" filter="url(#shadow)">
    <g transform="translate(126 202)">
      <rect width="250" height="126" rx="14" fill="#bae6fd"/>
      <text x="125" y="42" text-anchor="middle" fill="#082f49" font-size="22" font-weight="700">Fundamentals</text>
      <text x="125" y="74" text-anchor="middle" fill="#075985" font-size="14">data structures, APIs,</text>
      <text x="125" y="96" text-anchor="middle" fill="#075985" font-size="14">complexity, trade-offs</text>
    </g>
    <g transform="translate(434 202)">
      <rect width="250" height="126" rx="14" fill="#fef3c7"/>
      <text x="125" y="42" text-anchor="middle" fill="#451a03" font-size="22" font-weight="700">AI tool use</text>
      <text x="125" y="74" text-anchor="middle" fill="#78350f" font-size="14">prompt, inspect,</text>
      <text x="125" y="96" text-anchor="middle" fill="#78350f" font-size="14">question the output</text>
    </g>
    <g transform="translate(742 202)">
      <rect width="250" height="126" rx="14" fill="#dcfce7"/>
      <text x="125" y="42" text-anchor="middle" fill="#052e16" font-size="22" font-weight="700">Debugging</text>
      <text x="125" y="74" text-anchor="middle" fill="#166534" font-size="14">logs, tests, reproduction,</text>
      <text x="125" y="96" text-anchor="middle" fill="#166534" font-size="14">root cause</text>
    </g>
    <g transform="translate(280 390)">
      <rect width="250" height="126" rx="14" fill="#fbcfe8"/>
      <text x="125" y="42" text-anchor="middle" fill="#500724" font-size="22" font-weight="700">System thinking</text>
      <text x="125" y="74" text-anchor="middle" fill="#831843" font-size="14">scale, failure modes,</text>
      <text x="125" y="96" text-anchor="middle" fill="#831843" font-size="14">operability</text>
    </g>
    <g transform="translate(590 390)">
      <rect width="250" height="126" rx="14" fill="#ddd6fe"/>
      <text x="125" y="42" text-anchor="middle" fill="#312e81" font-size="22" font-weight="700">Communication</text>
      <text x="125" y="74" text-anchor="middle" fill="#4338ca" font-size="14">explain choices,</text>
      <text x="125" y="96" text-anchor="middle" fill="#4338ca" font-size="14">ask better questions</text>
    </g>
  </g>

  <g stroke="#475569" stroke-width="3" fill="none">
    <path d="M376 265 H434"/>
    <path d="M684 265 H742"/>
    <path d="M500 328 L420 390"/>
    <path d="M620 328 L710 390"/>
  </g>

  <g transform="translate(184 548)" font-family="Arial, sans-serif">
    <rect width="752" height="38" rx="9" fill="#0b1120" stroke="#334155"/>
    <text x="376" y="25" text-anchor="middle" fill="#cbd5e1" font-size="16">The best candidate is not AI-free. The best candidate is trustworthy with or without AI.</text>
  </g>
</svg>
