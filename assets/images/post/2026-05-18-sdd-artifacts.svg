<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="640" viewBox="0 0 1120 640" role="img" aria-labelledby="title desc">
  <title id="title">Three simple SDD artifacts</title>
  <desc id="desc">Three documents named spec.md, design.md, and tasks.md connected to code and tests.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#94a3b8"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="13" flood-color="#020617" flood-opacity="0.36"/>
    </filter>
  </defs>

  <rect width="1120" height="640" rx="22" fill="#0f172a"/>
  <rect x="54" y="44" width="1012" height="548" rx="18" fill="#111827" stroke="#334155"/>

  <text x="84" y="98" fill="#f8fafc" font-family="Arial, sans-serif" font-size="34" font-weight="700">Use three tiny files</text>
  <text x="84" y="134" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="18">A simple SDD workflow can live beside the code. No heavy process needed.</text>

  <g fill="none" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)">
    <path d="M322 326 H438"/>
    <path d="M622 326 H738"/>
    <path d="M860 386 C820 462, 700 506, 568 506"/>
    <path d="M442 506 C336 486, 270 428, 244 386"/>
  </g>

  <g filter="url(#shadow)" font-family="Arial, sans-serif">
    <g transform="translate(122 216)">
      <rect width="220" height="170" rx="14" fill="#f8fafc"/>
      <rect width="220" height="44" rx="14" fill="#bae6fd"/>
      <text x="22" y="29" fill="#082f49" font-size="18" font-weight="700">spec.md</text>
      <text x="22" y="76" fill="#334155" font-size="15">Goal</text>
      <text x="22" y="104" fill="#334155" font-size="15">Requirements</text>
      <text x="22" y="132" fill="#334155" font-size="15">Non-goals</text>
    </g>
    <g transform="translate(448 216)">
      <rect width="220" height="170" rx="14" fill="#f8fafc"/>
      <rect width="220" height="44" rx="14" fill="#fef3c7"/>
      <text x="22" y="29" fill="#451a03" font-size="18" font-weight="700">design.md</text>
      <text x="22" y="76" fill="#334155" font-size="15">Data flow</text>
      <text x="22" y="104" fill="#334155" font-size="15">Interfaces</text>
      <text x="22" y="132" fill="#334155" font-size="15">Risks</text>
    </g>
    <g transform="translate(774 216)">
      <rect width="220" height="170" rx="14" fill="#f8fafc"/>
      <rect width="220" height="44" rx="14" fill="#dcfce7"/>
      <text x="22" y="29" fill="#052e16" font-size="18" font-weight="700">tasks.md</text>
      <text x="22" y="76" fill="#334155" font-size="15">Small steps</text>
      <text x="22" y="104" fill="#334155" font-size="15">Test mapping</text>
      <text x="22" y="132" fill="#334155" font-size="15">Done checklist</text>
    </g>
  </g>

  <g transform="translate(392 462)" font-family="Arial, sans-serif" filter="url(#shadow)">
    <rect width="336" height="88" rx="14" fill="#0b1120" stroke="#334155"/>
    <text x="168" y="38" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="700">code + tests</text>
    <text x="168" y="64" text-anchor="middle" fill="#cbd5e1" font-size="15">implementation follows the files above</text>
  </g>
</svg>
