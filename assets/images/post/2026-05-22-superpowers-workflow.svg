<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="650" viewBox="0 0 1120 650" role="img" aria-labelledby="title desc">
  <title id="title">Superpowers workflow</title>
  <desc id="desc">A Superpowers workflow from brainstorming to worktree, plan, TDD, subagents, review, and finishing branch.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#38bdf8"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="13" flood-color="#020617" flood-opacity="0.36"/>
    </filter>
  </defs>

  <rect width="1120" height="650" rx="22" fill="#0f172a"/>
  <rect x="54" y="44" width="1012" height="558" rx="18" fill="#111827" stroke="#334155"/>

  <text x="84" y="98" fill="#f8fafc" font-family="Arial, sans-serif" font-size="34" font-weight="700">What Superpowers adds</text>
  <text x="84" y="134" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="18">It tries to keep the agent from jumping straight to code.</text>

  <g fill="none" stroke="#38bdf8" stroke-width="5" marker-end="url(#arrow)">
    <path d="M248 248 H362"/>
    <path d="M502 248 H616"/>
    <path d="M756 248 H876"/>
    <path d="M908 306 V386"/>
    <path d="M800 446 H686"/>
    <path d="M546 446 H432"/>
    <path d="M292 446 H222"/>
  </g>

  <g filter="url(#shadow)" font-family="Arial, sans-serif">
    <g transform="translate(104 200)">
      <rect width="170" height="96" rx="14" fill="#bae6fd"/>
      <text x="85" y="40" text-anchor="middle" fill="#082f49" font-size="20" font-weight="700">Brainstorm</text>
      <text x="85" y="68" text-anchor="middle" fill="#075985" font-size="14">design first</text>
    </g>
    <g transform="translate(362 200)">
      <rect width="170" height="96" rx="14" fill="#fef3c7"/>
      <text x="85" y="40" text-anchor="middle" fill="#451a03" font-size="20" font-weight="700">Worktree</text>
      <text x="85" y="68" text-anchor="middle" fill="#78350f" font-size="14">safe branch</text>
    </g>
    <g transform="translate(620 200)">
      <rect width="170" height="96" rx="14" fill="#dcfce7"/>
      <text x="85" y="40" text-anchor="middle" fill="#052e16" font-size="20" font-weight="700">Plan</text>
      <text x="85" y="68" text-anchor="middle" fill="#166534" font-size="14">tiny tasks</text>
    </g>
    <g transform="translate(846 386)">
      <rect width="170" height="96" rx="14" fill="#fbcfe8"/>
      <text x="85" y="40" text-anchor="middle" fill="#500724" font-size="20" font-weight="700">TDD</text>
      <text x="85" y="68" text-anchor="middle" fill="#831843" font-size="14">red green refactor</text>
    </g>
    <g transform="translate(590 386)">
      <rect width="170" height="96" rx="14" fill="#ddd6fe"/>
      <text x="85" y="40" text-anchor="middle" fill="#312e81" font-size="20" font-weight="700">Subagents</text>
      <text x="85" y="68" text-anchor="middle" fill="#4338ca" font-size="14">one task each</text>
    </g>
    <g transform="translate(332 386)">
      <rect width="170" height="96" rx="14" fill="#bbf7d0"/>
      <text x="85" y="40" text-anchor="middle" fill="#052e16" font-size="20" font-weight="700">Review</text>
      <text x="85" y="68" text-anchor="middle" fill="#166534" font-size="14">spec then quality</text>
    </g>
    <g transform="translate(104 386)">
      <rect width="170" height="96" rx="14" fill="#f8fafc"/>
      <text x="85" y="40" text-anchor="middle" fill="#0f172a" font-size="20" font-weight="700">Finish</text>
      <text x="85" y="68" text-anchor="middle" fill="#475569" font-size="14">verify and decide</text>
    </g>
  </g>
</svg>
