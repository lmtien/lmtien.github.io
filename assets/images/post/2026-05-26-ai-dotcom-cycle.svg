<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="650" viewBox="0 0 1120 650" role="img" aria-labelledby="title desc">
  <title id="title">Dot-com and AI boom cycle</title>
  <desc id="desc">A comparison diagram showing how hype, capital, correction, and useful infrastructure can happen in both dot-com and AI eras.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#38bdf8"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="13" flood-color="#020617" flood-opacity="0.36"/>
    </filter>
  </defs>

  <rect width="1120" height="650" rx="22" fill="#0f172a"/>
  <rect x="54" y="44" width="1012" height="558" rx="18" fill="#111827" stroke="#334155"/>

  <text x="84" y="98" fill="#f8fafc" font-family="Arial, sans-serif" font-size="34" font-weight="700">A bubble can burst while the technology survives</text>
  <text x="84" y="134" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="18">The internet was real. The pricing was wrong. AI may rhyme with that story.</text>

  <g fill="none" stroke="#38bdf8" stroke-width="5" marker-end="url(#arrow)">
    <path d="M230 282 H384"/>
    <path d="M516 282 H670"/>
    <path d="M802 282 H920"/>
    <path d="M936 332 C902 438, 768 500, 612 502"/>
  </g>

  <g filter="url(#shadow)" font-family="Arial, sans-serif">
    <g transform="translate(104 224)">
      <rect width="170" height="116" rx="14" fill="#bae6fd"/>
      <text x="85" y="44" text-anchor="middle" fill="#082f49" font-size="21" font-weight="700">New tech</text>
      <text x="85" y="74" text-anchor="middle" fill="#075985" font-size="14">real capability</text>
    </g>
    <g transform="translate(384 224)">
      <rect width="170" height="116" rx="14" fill="#fef3c7"/>
      <text x="85" y="44" text-anchor="middle" fill="#451a03" font-size="21" font-weight="700">Narrative</text>
      <text x="85" y="74" text-anchor="middle" fill="#78350f" font-size="14">future priced early</text>
    </g>
    <g transform="translate(670 224)">
      <rect width="170" height="116" rx="14" fill="#fbcfe8"/>
      <text x="85" y="44" text-anchor="middle" fill="#500724" font-size="21" font-weight="700">Correction</text>
      <text x="85" y="74" text-anchor="middle" fill="#831843" font-size="14">weak projects fail</text>
    </g>
    <g transform="translate(884 224)">
      <rect width="170" height="116" rx="14" fill="#dcfce7"/>
      <text x="85" y="44" text-anchor="middle" fill="#052e16" font-size="21" font-weight="700">Infrastructure</text>
      <text x="85" y="74" text-anchor="middle" fill="#166534" font-size="14">useful part remains</text>
    </g>
  </g>

  <g transform="translate(234 460)" font-family="Arial, sans-serif" filter="url(#shadow)">
    <rect width="652" height="88" rx="14" fill="#0b1120" stroke="#334155"/>
    <text x="326" y="36" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="700">The lesson is not "avoid the internet" or "avoid AI"</text>
    <text x="326" y="62" text-anchor="middle" fill="#cbd5e1" font-size="16">The lesson is to separate durable utility from speculative heat.</text>
  </g>
</svg>
